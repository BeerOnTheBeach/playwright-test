name: Playwright Tests & GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Fetch existing reports.json from gh-pages
        run: |
          mkdir -p public
          curl -sf "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/gh-pages/reports.json" \
            -o public/reports.json || echo "[]" > public/reports.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run Playwright tests
        run: npm test
        continue-on-error: true

      - name: Publish report
        run: npm run report:publish

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true

